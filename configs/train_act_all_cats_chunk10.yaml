dataset:
  repo_id: repo_act_all_cats_c10
  root: Datasets/example/four_types_merged

policy:
  type: act
  device: cuda
  push_to_hub: false
  chunk_size: 10
  n_action_steps: 10

  input_features:
    observation.state:
      type: STATE
      shape: [12]
    observation.images.top_rgb:
      type: VISUAL
      shape: [3, 480, 640]
    observation.images.left_rgb:
      type: VISUAL
      shape: [3, 480, 640]
    observation.images.right_rgb:
      type: VISUAL
      shape: [3, 480, 640]

  output_features:
    action:
      type: ACTION
      shape: [12]

output_dir: outputs/train/act_all_cats_chunk10
batch_size: 16
steps: 30000
save_freq: 5000
log_freq: 1000

wandb:
  enable: false
